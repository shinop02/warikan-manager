<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EITS 割り勘マネージャー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0071e3;
            --primary-hover: #0077ed;
            --primary-light: rgba(0,113,227,0.08);
            --bg: #f5f5f7;
            --card: rgba(255,255,255,0.85);
            --text: #1d1d1f;
            --text-secondary: #86868b;
            --text-muted: #aeaeb2;
            --border: rgba(0,0,0,0.06);
            --border-strong: #d2d2d7;
            --success: #34c759;
            --warning: #ff9500;
            --danger: #ff3b30;
            --glass-blur: saturate(180%) blur(20px);
            --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }
        body {
            font-family: 'Ember Modern Display', Meiryo, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        input, select, textarea, button {
            font-family: 'Ember Modern Display', Meiryo, sans-serif;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 32px 24px;
            background: var(--card);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }
        .header p { color: var(--text-secondary); font-size: 0.95rem; }
        .section {
            background: var(--card);
            backdrop-filter: var(--glass-blur);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 20px;
            transition: box-shadow 0.3s;
        }
        .section:hover { box-shadow: var(--shadow-hover); }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title .icon { font-size: 1.4rem; }

        /* Buttons */
        .btn {
            border: none;
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px rgba(0,113,227,0.3); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { box-shadow: 0 4px 12px rgba(52,199,89,0.3); }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-warning:hover { box-shadow: 0 4px 12px rgba(255,149,0,0.3); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { box-shadow: 0 4px 12px rgba(255,59,48,0.3); }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1.5px solid rgba(0,113,227,0.3);
        }
        .btn-outline:hover { background: var(--primary-light); }
        .btn-small { padding: 6px 12px; font-size: 0.78rem; border-radius: 8px; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th {
            text-align: left;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-strong);
        }
        td { padding: 6px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: rgba(0,113,227,0.03); }

        /* Inputs */
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            font-size: 0.82rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: rgba(255,255,255,0.6);
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.2s;
            background: rgba(255,255,255,0.6);
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
        }
        input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Grid helpers */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
        @media (max-width: 600px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { padding: 20px 16px; }
            .header h1 { font-size: 1.5rem; }
            .section { padding: 16px; }
            .section-title { font-size: 1rem; }
            .btn { padding: 8px 14px; font-size: 0.78rem; }
            .btn-small { padding: 5px 10px; font-size: 0.72rem; }
            .btn-group { gap: 6px; }
            table { font-size: 0.78rem; }
            th { font-size: 0.68rem; padding: 6px 4px; }
            td { padding: 4px; }
            th:nth-child(1) { min-width: 90px !important; }
            th:nth-child(2) { width: 70px !important; }
            th:nth-child(3), th:nth-child(4), th:nth-child(5) { width: 40px !important; }
            th:nth-child(6) { width: 70px !important; }
            th:nth-child(7) { width: 36px !important; }
            input[type="text"], input[type="number"], select { padding: 6px 8px; font-size: 0.78rem; }
            input[type="checkbox"] { width: 16px; height: 16px; }
            .ratio-group input { width: 60px; }
            .slack-output { font-size: 0.75rem; padding: 12px; }
            .modal { padding: 20px; width: 95vw; }
        }
        @media (max-width: 400px) {
            body { padding: 8px; }
            .header h1 { font-size: 1.3rem; }
            .section { padding: 12px; border-radius: 12px; }
            th:nth-child(3), th:nth-child(4), th:nth-child(5) { width: 32px !important; font-size: 0.6rem; }
            .btn-group { gap: 4px; }
            .btn { padding: 6px 10px; font-size: 0.72rem; }
            .grid-4 { grid-template-columns: 1fr 1fr; }
        }

        /* Ratio inputs */
        .ratio-group { display: flex; align-items: center; gap: 8px; }
        .ratio-group label { font-size: 0.82rem; font-weight: 600; min-width: 30px; }
        .ratio-group input { width: 80px; text-align: center; }

        /* Diff display */
        .diff-display {
            text-align: center;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 1rem;
            margin-top: 16px;
        }
        .diff-zero { background: rgba(52,199,89,0.1); color: var(--success); }
        .diff-positive { background: rgba(255,149,0,0.1); color: var(--warning); }
        .diff-negative { background: rgba(255,59,48,0.1); color: var(--danger); }

        /* Slack output */
        .slack-output {
            background: #1a1d21;
            color: #d1d2d3;
            padding: 16px;
            border-radius: var(--radius-sm);
            font-family: 'Ember Modern Display', Meiryo, monospace;
            font-size: 0.82rem;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
        }

        /* Bulk paste modal */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            width: 520px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .modal h3 { font-size: 1.1rem; margin-bottom: 8px; }
        .modal p { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 12px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

        /* Hidden row */
        .hidden-row { display: none; }
        .row-calculated { background: rgba(52,199,89,0.04); }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-blue { background: var(--primary-light); color: var(--primary); }
        .badge-green { background: rgba(52,199,89,0.1); color: var(--success); }

        /* Screenshot button */
        .screenshot-section {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍻 EITS 割り勘マネージャー</h1>
            <p>歓送迎会・チーム飲み会の会費を簡単に按分計算</p>
        </div>

        <!-- Member Section -->
        <div class="section">
            <div class="section-title">
                <span class="icon">👥</span> メンバー
                <span class="badge badge-blue" id="memberCount">0人</span>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="loadEITSPaid()">📋 Paidメンバー読込</button>
                <button class="btn btn-outline" onclick="loadAllEITS()">👥 EITS全員読込</button>
                <button class="btn btn-warning" onclick="openBulkPaste()">📝 一括入力（コピペ）</button>
                <button class="btn btn-outline btn-small" onclick="addParticipantRow()">＋ 行追加</button>
                <button class="btn btn-danger btn-small" onclick="clearParticipants()">🗑 クリア</button>
            </div>
            <div class="btn-group" style="margin-bottom:12px;">
                <button class="btn btn-outline btn-small" onclick="bulkCheck('gift',true)">🎁全選択</button>
                <button class="btn btn-outline btn-small" onclick="bulkCheck('gift',false)">🎁全解除</button>
                <button class="btn btn-outline btn-small" onclick="bulkCheck('primary',true)">1次 全選択</button>
                <button class="btn btn-outline btn-small" onclick="bulkCheck('primary',false)">1次 全解除</button>
                <button class="btn btn-outline btn-small" onclick="bulkCheck('secondary',true)">2次 全選択</button>
                <button class="btn btn-outline btn-small" onclick="bulkCheck('secondary',false)">2次 全解除</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th style="min-width:140px;">名前</th>
                            <th style="width:110px;">Level</th>
                            <th style="width:60px;text-align:center;">
                                <input type="checkbox" id="checkAllGift" onchange="checkAllColumn('gift')"> 送別品
                            </th>
                            <th style="width:60px;text-align:center;">
                                <input type="checkbox" id="checkAllPrimary" onchange="checkAllColumn('primary')"> 1次
                            </th>
                            <th style="width:60px;text-align:center;">
                                <input type="checkbox" id="checkAllSecondary" onchange="checkAllColumn('secondary')"> 2次
                            </th>
                            <th style="width:100px;">支払額</th>
                            <th style="width:50px;"></th>
                        </tr>
                    </thead>
                    <tbody id="participantTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Gift Section -->
        <div class="section">
            <div class="section-title"><span class="icon">🎁</span> 送別品・プレゼント</div>
            <table>
                <thead>
                    <tr>
                        <th>品名</th>
                        <th style="width:120px;">金額</th>
                        <th style="width:50px;"></th>
                    </tr>
                </thead>
                <tbody id="giftTableBody">
                    <tr>
                        <td><input type="text" class="gift-item" placeholder="例: プレゼント"></td>
                        <td><input type="number" class="gift-amount" placeholder="0"></td>
                        <td><button class="btn btn-danger btn-small" onclick="deleteGiftRow(this)">×</button></td>
                    </tr>
                </tbody>
            </table>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">
                <button class="btn btn-outline btn-small" onclick="addGiftRow()">＋ 行追加</button>
                <div style="font-weight:700;">送別品合計: <span id="giftTotal">¥0</span></div>
            </div>
        </div>

        <!-- Amount & Ratio Section -->
        <div class="section">
            <div class="section-title"><span class="icon">💰</span> 金額設定</div>
            <div class="grid-2" style="margin-bottom:20px;">
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">一次会 合計</label>
                    <input type="number" id="primaryTotal" placeholder="0">
                </div>
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">二次会 合計</label>
                    <input type="number" id="secondaryTotal" placeholder="0">
                </div>
            </div>
            <div style="margin-bottom:16px;">
                <label style="font-size:0.8rem;color:var(--text-secondary);display:block;margin-bottom:8px;">レベル別 比率</label>
                <div class="grid-4">
                    <div class="ratio-group"><label>L4</label><input type="number" id="ratioL4" value="1.0" step="0.1"></div>
                    <div class="ratio-group"><label>L5</label><input type="number" id="ratioL5" value="1.2" step="0.1"></div>
                    <div class="ratio-group"><label>TL</label><input type="number" id="ratioTL" value="1.4" step="0.1"></div>
                    <div class="ratio-group"><label>L6</label><input type="number" id="ratioL6" value="1.6" step="0.1"></div>
                </div>
            </div>
            <div style="text-align:center;">
                <button class="btn btn-success" onclick="calculate()" style="font-size:1rem;padding:12px 40px;">⚡ 計算する</button>
            </div>
            <div id="diffDisplay" class="diff-display" style="display:none;"></div>
        </div>

        <!-- Payment Info Section -->
        <div class="section">
            <div class="section-title"><span class="icon">💳</span> 支払い情報</div>
            <div class="grid-2">
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">幹事名</label>
                    <input type="text" id="organizerName" placeholder="幹事の名前">
                </div>
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">支払い期限</label>
                    <input type="date" id="paymentDeadline">
                </div>
            </div>
            <div style="margin-top:12px;">
                <label style="font-size:0.8rem;color:var(--text-secondary);">PayPayリンク</label>
                <input type="text" id="paypayLink" placeholder="https://qr.paypay.ne.jp/...">
            </div>
            <div class="grid-4" style="margin-top:12px;">
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">銀行名</label>
                    <input type="text" id="bankName" placeholder="銀行名">
                </div>
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">支店名</label>
                    <input type="text" id="branchName" placeholder="支店名">
                </div>
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">口座番号</label>
                    <input type="text" id="accountNumber" placeholder="口座番号">
                </div>
                <div>
                    <label style="font-size:0.8rem;color:var(--text-secondary);">口座名義</label>
                    <input type="text" id="accountName" placeholder="口座名義">
                </div>
            </div>
        </div>

        <!-- Slack Message Section -->
        <div class="section">
            <div class="section-title"><span class="icon">📤</span> Slack連絡文</div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="generateSlackMessage()">📝 連絡文を生成</button>
                <button class="btn btn-success" onclick="copyToClipboard()">📋 コピー</button>
            </div>
            <div class="slack-output" id="slackOutput">ここに連絡文が生成されます...</div>
        </div>

        <!-- Data Management -->
        <div class="section">
            <div class="section-title"><span class="icon">💾</span> データ管理</div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveToStorage()">💾 保存</button>
                <button class="btn btn-outline" onclick="loadFromStorage()">📂 復元</button>
                <button class="btn btn-danger btn-small" onclick="clearAllData()">🗑 全データクリア</button>
            </div>
            <p style="font-size:0.75rem;color:var(--text-muted);">※データはブラウザのlocalStorageに保存されます（このPC・ブラウザ限定）</p>
        </div>
    </div>

    <!-- Bulk Paste Modal -->
    <div class="modal-overlay" id="bulkModal">
        <div class="modal">
            <h3>📝 メンバー一括入力</h3>
            <p>以下のフォーマットでコピペしてください（改行区切り）：</p>
            <div style="background:var(--bg);padding:10px;border-radius:8px;font-size:0.75rem;margin-bottom:12px;color:var(--text-secondary);">
                <code>名前[TABまたはカンマ]レベル</code><br>
                例:<br>
                <code>田中太郎, L5</code><br>
                <code>鈴木花子	L4</code><br>
                <code>佐藤一郎</code> ← レベル省略時はL5
            </div>
            <textarea id="bulkInput" placeholder="ここにメンバーリストを貼り付け...&#10;&#10;名前, レベル&#10;名前	レベル&#10;名前（レベル省略→L5）"></textarea>
            <div class="modal-btns">
                <button class="btn btn-outline" onclick="closeBulkPaste()">キャンセル</button>
                <button class="btn btn-primary" onclick="applyBulkPaste()">適用</button>
            </div>
        </div>
    </div>

                {name:"Satoshi Kido",alias:"stkido",role:"L5"},
                {name:"Shun Hagiwara",alias:"hagiwash",role:"L5"},
                {name:"Takuya Eguchi",alias:"taeguchi",role:"L5"}
            ],
            "solution_sales": [
                {name:"Hiroyuki Uchida",alias:"huuchid",role:"L5"},
                {name:"Itsuki Ota",alias:"otaitsu",role:"L5"},
                {name:"Megumi Otosaka",alias:"otosakvm",role:"L5"}
            ],
            "renewed": [
                {name:"Makoto Chiba",alias:"makotoc",role:"L5"},
                {name:"Maho Inoue",alias:"mahoinou",role:"L5"}
            ]
        };

        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', function() {
            initializeParticipants();
            attachGiftTableEvents();
            attachInputEvents();
        });

        function initializeParticipants() {
            const tbody = document.getElementById('participantTableBody');
            if (tbody.children.length === 0) {
                for (let i = 0; i < 5; i++) addParticipantRow();
            }
            updateMemberCount();
        }

        // ===== EITS MEMBER LOADING =====
        function loadEITSPaid() {
            loadMembers(EITS_MEMBERS.paid);
        }

        function loadAllEITS() {
            const all = [];
            Object.values(EITS_MEMBERS).forEach(team => all.push(...team));
            loadMembers(all);
        }

        function loadMembers(members) {
            const tbody = document.getElementById('participantTableBody');
            tbody.innerHTML = '';
            members.forEach(m => {
                addParticipantRow(m.name, m.role);
            });
            updateMemberCount();
            saveToStorage();
        }

        // ===== BULK PASTE =====
        function openBulkPaste() {
            document.getElementById('bulkModal').classList.add('active');
            document.getElementById('bulkInput').focus();
        }

        function closeBulkPaste() {
            document.getElementById('bulkModal').classList.remove('active');
            document.getElementById('bulkInput').value = '';
        }

        function applyBulkPaste() {
            const text = document.getElementById('bulkInput').value.trim();
            if (!text) { closeBulkPaste(); return; }

            const lines = text.split('\n').filter(l => l.trim());
            const tbody = document.getElementById('participantTableBody');
            tbody.innerHTML = '';

            lines.forEach(line => {
                let parts;
                if (line.includes('\t')) {
                    parts = line.split('\t');
                } else if (line.includes(',')) {
                    parts = line.split(',');
                } else {
                    parts = [line.trim()];
                }
                const name = (parts[0] || '').trim();
                let role = (parts[1] || 'L5').trim().toUpperCase();
                if (!['L4','L5','TL','L6'].includes(role)) role = 'L5';
                if (name) addParticipantRow(name, role);
            });

            updateMemberCount();
            saveToStorage();
            closeBulkPaste();
        }

        // ===== PARTICIPANT TABLE =====
        function addParticipantRow(name='', role='L5') {
            const tbody = document.getElementById('participantTableBody');
            const row = tbody.insertRow();
            row.innerHTML = `
                <td><input type="text" class="participant-name" value="${name}" placeholder="名前"></td>
                <td>
                    <select class="participant-role">
                        <option value="L4" ${role==='L4'?'selected':''}>L4</option>
                        <option value="L5" ${role==='L5'?'selected':''}>L5</option>
                        <option value="TL" ${role==='TL'?'selected':''}>TL</option>
                        <option value="L6" ${role==='L6'?'selected':''}>L6</option>
                    </select>
                </td>
                <td style="text-align:center;"><input type="checkbox" class="check-gift"></td>
                <td style="text-align:center;"><input type="checkbox" class="check-primary"></td>
                <td style="text-align:center;"><input type="checkbox" class="check-secondary"></td>
                <td><input type="text" class="payment-amount" readonly style="background:var(--bg);font-weight:700;"></td>
                <td><button class="btn btn-danger btn-small" onclick="deleteParticipantRow(this)">×</button></td>
            `;
            const nameInput = row.querySelector('.participant-name');
            nameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    const nextRow = this.closest('tr').nextElementSibling;
                    if (nextRow) {
                        nextRow.querySelector('.participant-name').focus();
                    } else {
                        addParticipantRow();
                        setTimeout(() => tbody.lastElementChild.querySelector('.participant-name').focus(), 0);
                    }
                }
            });
            row.querySelectorAll('input, select').forEach(input => {
                input.addEventListener('change', () => { saveToStorage(); updateMemberCount(); });
                input.addEventListener('input', () => { saveToStorage(); updateMemberCount(); });
            });
        }

        function deleteParticipantRow(btn) {
            btn.closest('tr').remove();
            updateMemberCount();
            saveToStorage();
        }

        function clearParticipants() {
            if (!confirm('メンバーリストをクリアしますか？')) return;
            document.getElementById('participantTableBody').innerHTML = '';
            for (let i = 0; i < 5; i++) addParticipantRow();
            updateMemberCount();
            saveToStorage();
        }

        function updateMemberCount() {
            const names = document.querySelectorAll('.participant-name');
            let count = 0;
            names.forEach(n => { if (n.value.trim()) count++; });
            document.getElementById('memberCount').textContent = count + '人';
        }

        function checkAllColumn(type) {
            const checkboxId = 'checkAll' + type.charAt(0).toUpperCase() + type.slice(1);
            const isChecked = document.getElementById(checkboxId).checked;
            document.querySelectorAll('.check-' + type).forEach(cb => cb.checked = isChecked);
            saveToStorage();
        }

        function bulkCheck(type, checked) {
            document.querySelectorAll('.check-' + type).forEach(cb => cb.checked = checked);
            const checkboxId = 'checkAll' + type.charAt(0).toUpperCase() + type.slice(1);
            document.getElementById(checkboxId).checked = checked;
            saveToStorage();
        }

        // ===== GIFT TABLE =====
        function attachGiftTableEvents() {
            const tbody = document.getElementById('giftTableBody');
            tbody.addEventListener('input', function(e) {
                if (e.target.classList.contains('gift-amount')) updateGiftTotal();
                saveToStorage();
            });
        }

        function addGiftRow() {
            const tbody = document.getElementById('giftTableBody');
            const row = tbody.insertRow();
            row.innerHTML = `
                <td><input type="text" class="gift-item" placeholder="例: プレゼント"></td>
                <td><input type="number" class="gift-amount" placeholder="0"></td>
                <td><button class="btn btn-danger btn-small" onclick="deleteGiftRow(this)">×</button></td>
            `;
        }

        function deleteGiftRow(btn) {
            btn.closest('tr').remove();
            updateGiftTotal();
            saveToStorage();
        }

        function updateGiftTotal() {
            let total = 0;
            document.querySelectorAll('.gift-amount').forEach(input => total += parseFloat(input.value) || 0);
            document.getElementById('giftTotal').textContent = '¥' + total.toLocaleString();
        }

        function getGiftTotal() {
            let total = 0;
            document.querySelectorAll('.gift-amount').forEach(input => total += parseFloat(input.value) || 0);
            return total;
        }

        // ===== INPUT EVENTS =====
        function attachInputEvents() {
            ['primaryTotal','secondaryTotal','ratioL4','ratioL5','ratioTL','ratioL6',
             'organizerName','paymentDeadline','paypayLink','bankName','branchName','accountNumber','accountName'
            ].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', saveToStorage);
            });
        }

        // ===== CALCULATION =====
        function calculate() {
            const giftTotal = getGiftTotal();
            const primaryTotal = parseFloat(document.getElementById('primaryTotal').value) || 0;
            const secondaryTotal = parseFloat(document.getElementById('secondaryTotal').value) || 0;
            const ratios = {
                'L4': parseFloat(document.getElementById('ratioL4').value) || 1.0,
                'L5': parseFloat(document.getElementById('ratioL5').value) || 1.2,
                'TL': parseFloat(document.getElementById('ratioTL').value) || 1.4,
                'L6': parseFloat(document.getElementById('ratioL6').value) || 1.6
            };

            const rows = document.querySelectorAll('#participantTableBody tr');
            const participants = [];
            rows.forEach(row => {
                const name = row.querySelector('.participant-name').value.trim();
                if (name) {
                    participants.push({
                        row, name,
                        role: row.querySelector('.participant-role').value,
                        primary: row.querySelector('.check-primary').checked,
                        gift: row.querySelector('.check-gift').checked,
                        secondary: row.querySelector('.check-secondary').checked,
                        ratio: ratios[row.querySelector('.participant-role').value]
                    });
                }
            });

            const giftCalc = calcCategory(participants.filter(p => p.gift), giftTotal, ratios);
            const primaryCalc = calcCategory(participants.filter(p => p.primary), primaryTotal, ratios);
            const secondaryCalc = calcCategory(participants.filter(p => p.secondary), secondaryTotal, ratios);

            let totalCalc = 0;
            participants.forEach(p => {
                let amount = 0;
                if (p.gift) amount += giftCalc[p.name] || 0;
                if (p.primary) amount += primaryCalc[p.name] || 0;
                if (p.secondary) amount += secondaryCalc[p.name] || 0;
                p.row.querySelector('.payment-amount').value = '¥' + amount.toLocaleString();
                p.row.classList.add('row-calculated');
                totalCalc += amount;
            });

            rows.forEach(row => {
                const name = row.querySelector('.participant-name').value.trim();
                if (!name) row.classList.add('hidden-row');
                else row.classList.remove('hidden-row');
            });

            const actualTotal = giftTotal + primaryTotal + secondaryTotal;
            const diff = totalCalc - actualTotal;
            const diffEl = document.getElementById('diffDisplay');
            diffEl.style.display = 'block';
            if (diff === 0) {
                diffEl.className = 'diff-display diff-zero';
                diffEl.innerHTML = '✅ 差分: ¥0（ピッタリ！）';
            } else if (diff > 0) {
                diffEl.className = 'diff-display diff-positive';
                diffEl.innerHTML = '⚠️ 差分: +¥' + diff.toLocaleString() + '（按分合計が実費より多い）';
            } else {
                diffEl.className = 'diff-display diff-negative';
                diffEl.innerHTML = '⚠️ 差分: -¥' + Math.abs(diff).toLocaleString() + '（按分合計が実費より少ない）';
            }
            saveToStorage();
        }

        function calcCategory(participants, total, ratios) {
            if (!participants.length || !total) return {};
            const totalRatio = participants.reduce((s, p) => s + p.ratio, 0);
            const payments = {};
            participants.forEach(p => {
                payments[p.name] = Math.ceil((total * p.ratio) / totalRatio);
            });
            return payments;
        }

        // ===== SLACK MESSAGE =====
        function generateSlackMessage() {
            const giftTotal = getGiftTotal();
            const primaryTotal = parseFloat(document.getElementById('primaryTotal').value) || 0;
            const secondaryTotal = parseFloat(document.getElementById('secondaryTotal').value) || 0;
            const totalAmount = giftTotal + primaryTotal + secondaryTotal;
            const organizerName = document.getElementById('organizerName').value || '幹事';
            const deadline = document.getElementById('paymentDeadline').value;
            const paypayLink = document.getElementById('paypayLink').value;
            const bankName = document.getElementById('bankName').value;
            const branchName = document.getElementById('branchName').value;
            const accountNumber = document.getElementById('accountNumber').value;
            const accountName = document.getElementById('accountName').value;

            let msg = '【歓送迎会 会費のお知らせ】\n\n';
            msg += '=== 内訳 ===\n';
            if (giftTotal > 0) {
                msg += '■ 送別品\n';
                document.querySelectorAll('#giftTableBody tr').forEach(row => {
                    const item = row.querySelector('.gift-item').value;
                    const amount = parseFloat(row.querySelector('.gift-amount').value) || 0;
                    if (item && amount > 0) msg += `  ・${item}: ¥${amount.toLocaleString()}\n`;
                });
                msg += `  小計: ¥${giftTotal.toLocaleString()}\n\n`;
            }
            if (primaryTotal > 0) msg += `■ 一次会: ¥${primaryTotal.toLocaleString()}\n`;
            if (secondaryTotal > 0) msg += `■ 二次会: ¥${secondaryTotal.toLocaleString()}\n`;
            msg += `\n【総額】¥${totalAmount.toLocaleString()}\n\n`;
            msg += '=== 各自の支払額 ===\n';
            document.querySelectorAll('#participantTableBody tr:not(.hidden-row)').forEach(row => {
                const name = row.querySelector('.participant-name').value.trim();
                const amount = row.querySelector('.payment-amount').value;
                if (name && amount) msg += `${name}: ${amount}\n`;
            });
            msg += '\n=== お支払い方法 ===\n';
            if (paypayLink) msg += `【PayPay】\n${paypayLink}\n\n`;
            if (bankName && accountNumber) {
                msg += '【銀行振込】\n';
                if (bankName) msg += `銀行名: ${bankName}\n`;
                if (branchName) msg += `支店名: ${branchName}\n`;
                if (accountNumber) msg += `口座番号: ${accountNumber}\n`;
                if (accountName) msg += `口座名義: ${accountName}\n`;
                msg += '\n';
            }
            if (deadline) {
                const d = new Date(deadline);
                msg += `⏰ お支払い期限: ${d.getMonth()+1}月${d.getDate()}日までに\n\n`;
            }
            msg += `お問い合わせ: ${organizerName}\n`;
            msg += '\nよろしくお願いいたします！';
            document.getElementById('slackOutput').textContent = msg;
        }

        function copyToClipboard() {
            const text = document.getElementById('slackOutput').textContent;
            if (text === 'ここに連絡文が生成されます...') { alert('先に連絡文を生成してください'); return; }
            navigator.clipboard.writeText(text).then(() => alert('✅ コピーしました！'));
        }

        // ===== STORAGE =====
        function saveToStorage() {
            const data = {
                gifts: [],
                primaryTotal: document.getElementById('primaryTotal').value,
                secondaryTotal: document.getElementById('secondaryTotal').value,
                ratios: {
                    L4: document.getElementById('ratioL4').value,
                    L5: document.getElementById('ratioL5').value,
                    TL: document.getElementById('ratioTL').value,
                    L6: document.getElementById('ratioL6').value
                },
                organizer: {
                    name: document.getElementById('organizerName').value,
                    deadline: document.getElementById('paymentDeadline').value,
                    paypay: document.getElementById('paypayLink').value,
                    bank: document.getElementById('bankName').value,
                    branch: document.getElementById('branchName').value,
                    account: document.getElementById('accountNumber').value,
                    accountName: document.getElementById('accountName').value
                },
                participants: []
            };
            document.querySelectorAll('#giftTableBody tr').forEach(row => {
                data.gifts.push({
                    item: row.querySelector('.gift-item').value,
                    amount: row.querySelector('.gift-amount').value
                });
            });
            document.querySelectorAll('#participantTableBody tr').forEach(row => {
                data.participants.push({
                    name: row.querySelector('.participant-name').value,
                    role: row.querySelector('.participant-role').value,
                    primary: row.querySelector('.check-primary').checked,
                    gift: row.querySelector('.check-gift').checked,
                    secondary: row.querySelector('.check-secondary').checked
                });
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function loadFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) { alert('保存データがありません'); return; }
            try {
                const data = JSON.parse(saved);
                if (data.primaryTotal) document.getElementById('primaryTotal').value = data.primaryTotal;
                if (data.secondaryTotal) document.getElementById('secondaryTotal').value = data.secondaryTotal;
                if (data.ratios) {
                    document.getElementById('ratioL4').value = data.ratios.L4 || 1.0;
                    document.getElementById('ratioL5').value = data.ratios.L5 || 1.2;
                    document.getElementById('ratioTL').value = data.ratios.TL || 1.4;
                    document.getElementById('ratioL6').value = data.ratios.L6 || 1.6;
                }
                if (data.organizer) {
                    document.getElementById('organizerName').value = data.organizer.name || '';
                    document.getElementById('paymentDeadline').value = data.organizer.deadline || '';
                    document.getElementById('paypayLink').value = data.organizer.paypay || '';
                    document.getElementById('bankName').value = data.organizer.bank || '';
                    document.getElementById('branchName').value = data.organizer.branch || '';
                    document.getElementById('accountNumber').value = data.organizer.account || '';
                    document.getElementById('accountName').value = data.organizer.accountName || '';
                }
                if (data.gifts && data.gifts.length > 0) {
                    const tbody = document.getElementById('giftTableBody');
                    tbody.innerHTML = '';
                    data.gifts.forEach(gift => {
                        const row = tbody.insertRow();
                        row.innerHTML = `
                            <td><input type="text" class="gift-item" value="${gift.item}"></td>
                            <td><input type="number" class="gift-amount" value="${gift.amount}"></td>
                            <td><button class="btn btn-danger btn-small" onclick="deleteGiftRow(this)">×</button></td>
                        `;
                    });
                    updateGiftTotal();
                }
                if (data.participants && data.participants.length > 0) {
                    const tbody = document.getElementById('participantTableBody');
                    tbody.innerHTML = '';
                    data.participants.forEach(p => {
                        addParticipantRow(p.name, p.role);
                        const row = tbody.lastElementChild;
                        row.querySelector('.check-primary').checked = p.primary;
                        row.querySelector('.check-gift').checked = p.gift;
                        row.querySelector('.check-secondary').checked = p.secondary;
                    });
                }
                updateMemberCount();
                alert('✅ データを復元しました');
            } catch(e) {
                alert('❌ データ復元に失敗: ' + e.message);
            }
        }

        function clearAllData() {
            if (confirm('本当にすべてのデータをクリアしますか？')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }
    </script>
