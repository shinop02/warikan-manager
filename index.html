<title>EITS Warikan</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#1a73e8;--blue-light:#e8f0fe;--blue-dark:#1557b0;
  --green:#34a853;--green-light:#e6f4ea;
  --red:#ea4335;--yellow:#fbbc05;
  --bg:#0f0f14;--surface:rgba(255,255,255,0.03);
  --card-bg:rgba(255,255,255,0.06);
  --text:#e8eaed;--text-secondary:#9aa0a6;--text-tertiary:#5f6368;
  --border:rgba(255,255,255,0.08);--border-light:rgba(255,255,255,0.05);
  --glass:rgba(255,255,255,0.04);
  --shadow:0 8px 32px rgba(0,0,0,0.3);
  --radius:24px;--radius-sm:12px;
  --sidebar-w:200px;
}
html{scroll-behavior:smooth;}
body{font-family:'Google Sans',Roboto,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;}
button{cursor:pointer;font-family:inherit;border:none;outline:none;}
input,textarea,select{font-family:inherit;outline:none;}

/* ===== LOCK SCREEN ===== */
#lockScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0a0a0f;}
#lockScreen .bg-lines{position:absolute;inset:0;overflow:hidden;}
#lockScreen .bg-lines svg{width:100%;height:100%;opacity:0.12;}
.lock-box{position:relative;width:340px;padding:48px 36px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:24px;backdrop-filter:blur(40px);text-align:center;}
.lock-box h2{color:#fff;font-size:1.1rem;font-weight:400;margin-bottom:24px;letter-spacing:0.5px;}
.lock-input{width:100%;padding:14px 18px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:100px;color:#fff;font-size:0.95rem;transition:border 0.2s;}
.lock-input:focus{border-color:var(--blue);}
.lock-input::placeholder{color:rgba(255,255,255,0.25);}
.lock-btn{width:100%;margin-top:16px;padding:14px;background:var(--blue);color:#fff;border-radius:100px;font-size:0.9rem;font-weight:500;transition:background 0.2s;}
.lock-btn:hover{background:var(--blue-dark);}
.lock-hint{margin-top:12px;font-size:0.75rem;color:rgba(255,255,255,0.3);}
.lock-error{margin-top:10px;font-size:0.8rem;color:var(--red);opacity:0;transition:opacity 0.3s;}
.lock-error.show{opacity:1;}

/* ===== LAYOUT ===== */
#app{display:none;}
.layout{display:flex;height:100vh;}

/* ===== SIDEBAR ===== */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:rgba(15,15,20,0.95);border-right:1px solid var(--border);padding:24px 12px;display:flex;flex-direction:column;z-index:100;}
.sidebar-brand{font-size:0.8rem;font-weight:400;color:var(--text-secondary);margin-bottom:32px;padding:8px 12px;letter-spacing:0.3px;}
.sidebar-brand span{color:var(--blue);font-weight:500;}
.agenda-list{list-style:none;flex:1;}
.agenda-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);margin-bottom:2px;cursor:pointer;transition:all 0.2s;font-size:0.78rem;color:var(--text-secondary);}
.agenda-item:hover{background:rgba(255,255,255,0.04);}
.agenda-item .step-num{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:var(--text-tertiary);flex-shrink:0;}
.agenda-item.done .step-num{background:rgba(52,168,83,0.15);border-color:var(--green);color:var(--green);}

/* ===== SCROLL CONTAINER ===== */
.scroll-container{margin-left:var(--sidebar-w);flex:1;height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;position:relative;}

/* Background line art */
.bg-art{position:fixed;top:0;left:var(--sidebar-w);right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-art svg{width:100%;height:100%;opacity:0.035;}

/* ===== CARD PAGE ===== */
.card-page{min-height:100vh;scroll-snap-align:start;display:flex;align-items:stretch;justify-content:center;padding:16px 40px;position:relative;z-index:1;perspective:1200px;}
.card{width:100%;max-width:680px;padding:24px 32px;background:var(--card-bg);backdrop-filter:blur(24px) saturate(1.2);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);transform:rotateX(0deg);transition:transform 0.4s ease,opacity 0.4s ease;opacity:0.4;display:flex;flex-direction:column;margin:auto 0;}
.card.in-view{opacity:1;transform:rotateX(0deg) translateY(0);}
.card-page:not(.snapped) .card{transform:rotateX(3deg) translateY(20px);}

.card-title{font-size:0.88rem;font-weight:500;color:var(--text);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.card-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:100px;font-size:0.68rem;color:var(--text-secondary);margin-right:6px;}

/* ===== FORM ELEMENTS ===== */
.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.input{padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem;background:rgba(255,255,255,0.03);color:var(--text);transition:border 0.2s;}
.input:focus{border-color:var(--blue);background:rgba(255,255,255,0.05);}
.input::placeholder{color:var(--text-tertiary);}
.input-sm{padding:8px 12px;font-size:0.78rem;}
select.input{color:var(--text);background:rgba(255,255,255,0.03);}
select.input option{background:#1a1a24;color:var(--text);}
.btn{padding:10px 20px;border-radius:100px;font-size:0.78rem;font-weight:500;transition:all 0.2s;}
.btn-filled{background:var(--blue);color:#fff;}
.btn-filled:hover{background:var(--blue-dark);}
.btn-tonal{background:rgba(26,115,232,0.15);color:#8ab4f8;border:1px solid rgba(26,115,232,0.2);}
.btn-tonal:hover{background:rgba(26,115,232,0.25);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary);}
.btn-outline:hover{background:rgba(255,255,255,0.04);}
.btn-danger{background:rgba(234,67,53,0.1);color:#f28b82;border:1px solid rgba(234,67,53,0.2);}
.btn-danger:hover{background:rgba(234,67,53,0.2);}
.btn-sm{padding:6px 14px;font-size:0.72rem;}
.btn-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}

/* ===== TABLES ===== */
.data-table{width:100%;border-collapse:separate;border-spacing:0;}
.data-table th{text-align:left;padding:8px 10px;font-size:0.68rem;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border);white-space:nowrap;}
.data-table td{padding:8px 10px;font-size:0.8rem;border-bottom:1px solid var(--border-light);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table input[type="checkbox"]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;}

/* ===== RESULTS TABLE ===== */
.results-table{width:100%;border-collapse:separate;border-spacing:0 3px;}
.results-table tr{background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);}
.results-table td{padding:10px 14px;font-size:0.8rem;}
.results-table td:first-child{border-radius:var(--radius-sm) 0 0 var(--radius-sm);font-weight:500;color:var(--text);}
.results-table td:nth-child(2){color:var(--text-secondary);font-size:0.72rem;}
.results-table td:last-child{border-radius:0 var(--radius-sm) var(--radius-sm) 0;text-align:right;font-weight:600;color:#8ab4f8;white-space:nowrap;}
.results-diff{margin-top:14px;padding:10px 14px;border-radius:var(--radius-sm);font-size:0.78rem;text-align:center;}
.results-diff.ok{background:rgba(52,168,83,0.1);color:#81c995;border:1px solid rgba(52,168,83,0.2);}
.results-diff.warn{background:rgba(251,188,5,0.1);color:#fdd663;border:1px solid rgba(251,188,5,0.2);}

/* ===== NAV DOTS ===== */
.nav-dots{position:fixed;right:24px;top:50%;transform:translateY(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;transition:all 0.3s;padding:0;}
.nav-dot.active{background:var(--blue);transform:scale(1.4);}

/* ===== TEXTAREA ===== */
.textarea{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.78rem;line-height:1.6;resize:vertical;min-height:100px;background:rgba(255,255,255,0.03);color:var(--text);}
.textarea:focus{border-color:var(--blue);}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{width:90%;max-width:500px;background:#1a1a24;border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:0 16px 48px rgba(0,0,0,0.5);}
.modal h3{font-size:0.9rem;font-weight:500;margin-bottom:16px;color:var(--text);}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  :root{--sidebar-w:0px;}
  .sidebar{display:none;}
  .nav-dots{right:12px;}
  .card-page{padding:20px 16px;}
  .card{padding:28px 20px;border-radius:20px;}
}
</style>
</head>

    <button class="lock-btn" id="pwBtn" onclick="checkPw()">Unlock</button>

    <path d="M0 400 Q300 300 600 400 T1000 400" stroke="#EA4335" fill="none" stroke-width="1"></path>
    <path d="M0 600 Q350 700 700 600 T1000 600" stroke="#FBBC05" fill="none" stroke-width="1"></path>
    <path d="M0 800 Q200 700 500 800 T1000 800" stroke="#34A853" fill="none" stroke-width="0.8"></path>
    <circle cx="150" cy="350" r="60" stroke="#34A853" fill="none" stroke-width="0.8"></circle>

  </svg>
</div>

<!-- NAV DOTS -->

<!-- PAGE 0: Members -->

<div class="card">
  <div class="card-title">メンバー</div>
  <div class="btn-group">
    <button class="btn btn-filled" onclick="loadPaid()">Paid読込</button>
    <button class="btn btn-tonal" onclick="openBulkModal()">一括入力</button>
  </div>
  <div id="memberBadges" class="btn-group" style="margin-top:8px;"></div>
  <div id="memberList"></div>

    <input class="input" style="flex:1;" id="newName" placeholder="名前" onkeydown="if(event.key==='Enter'){addMember();}">
    <select class="input" id="newRole" style="width:80px;"><option value="L4">L4</option><option value="L5">L5</option><option value="TL">TL</option><option value="L6">L6</option></select>
    <button class="btn btn-tonal btn-sm" onclick="addMember()">追加</button>
  </div>

<!-- PAGE 1: Gift -->
<div class="card-page" data-page="1">
<div class="card">
  <div class="card-title">送別品・プレゼント</div>
  <div class="form-row">
    <input class="input" style="flex:1;" id="giftDesc" placeholder="品目（例：花束）" onkeydown="if(event.key==='Enter')document.getElementById('giftAmt').focus();">

  <div id="giftList" style="margin-top:8px;"></div>
  <div id="giftTotal" style="margin-top:8px;font-size:0.78rem;color:var(--text-secondary);"></div>
</div>

<!-- PAGE 2: Amount -->
<div class="card-page" data-page="2">
<div class="card">
  <div class="card-title">金額設定</div>
  <div style="margin-bottom:14px;">
    <label style="font-size:0.75rem;color:var(--text-secondary);display:block;margin-bottom:4px;">合計金額（税込）</label>
    <input class="input" id="totalAmount" type="number" placeholder="例: 150000" style="width:200px;">
  </div>
  <details style="margin-top:12px;">
    <summary style="font-size:0.75rem;color:var(--text-tertiary);cursor:pointer;">1人あたり × 人数で計算</summary>
    <div class="form-row" style="margin-top:8px;">
      <input class="input input-sm" id="perPerson" type="number" placeholder="1人あたり" style="width:120px;">
      <span style="font-size:0.8rem;color:var(--text-secondary);">×</span>
      <input class="input input-sm" id="headCount" type="number" placeholder="人数" style="width:80px;">
      <button class="btn btn-outline btn-sm" onclick="calcFromPer()">反映</button>
    </div>
  </details>
  <div style="margin-top:18px;">
    <label style="font-size:0.75rem;color:var(--text-secondary);display:block;margin-bottom:6px;">比率</label>
    <div class="form-row">
      <span style="font-size:0.75rem;width:26px;color:var(--text-secondary);">L4</span><input class="input input-sm ratio-input" data-role="L4" type="number" step="0.1" value="1.0" style="width:60px;">
      <span style="font-size:0.75rem;width:26px;color:var(--text-secondary);">L5</span><input class="input input-sm ratio-input" data-role="L5" type="number" step="0.1" value="1.3" style="width:60px;">
      <span style="font-size:0.75rem;width:26px;color:var(--text-secondary);">TL</span><input class="input input-sm ratio-input" data-role="TL" type="number" step="0.1" value="1.5" style="width:60px;">
      <span style="font-size:0.75rem;width:26px;color:var(--text-secondary);">L6</span><input class="input input-sm ratio-input" data-role="L6" type="number" step="0.1" value="2.0" style="width:60px;">
    </div>
  </div>
</div>

<div class="card">

    <h3>メンバー一括入力</h3>
    <p style="font-size:0.72rem;color:var(--text-secondary);margin-bottom:12px;">1行1名: 名前(tab/comma)役職</p>
    <textarea class="textarea" id="bulkText" placeholder="田中太郎,L5
山田花子,TL"></textarea>
    <div class="btn-group" style="margin-top:16px;justify-content:flex-end;">
      <button class="btn btn-outline" onclick="closeBulkModal()">キャンセル</button>
      <button class="btn btn-filled" onclick="applyBulk()">追加</button>
    </div>
  </div>
</div>

<script>
// ===== PASSWORD =====
let pwAttempts=0;
function checkPw(){
  if(document.getElementById('pwInput').value==='tmshino'){
    document.getElementById('lockScreen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    pwAttempts++;
    document.getElementById('pwError').classList.add('show');
    if(pwAttempts>=2)window.location.href='https://www.google.com';
  }
}

// ===== DATA =====
let members=[],gifts=[],results=[];
const PAID_MEMBERS=[
  {name:'Hayashi Saki',role:'TL'},{name:'Izawa Mariko',role:'TL'},
  {name:'Nakamura Toru',role:'L6'},{name:'Oh Moonsun',role:'L5'},
  {name:'Oki Ryosuke',role:'L5'},{name:'Nakajima Ryota',role:'L6'},
  {name:'Naito Saki',role:'L4'},{name:'Murakami Arisa',role:'L5'},
  {name:'Sato Ayumu',role:'L5'},{name:'Mori Daisuke',role:'L5'},
  {name:'Hama Ayaka',role:'L5'},{name:'Lee Yun',role:'L4'},
  {name:'Tsuchiya Ryota',role:'L4'},{name:'Masuda Mantaro',role:'TL'},
  {name:'Sakata Rokutoshi',role:'L5'},{name:'Shinozuka Tomohiro',role:'L5'},
  {name:'Gao Yuan',role:'L4'},{name:'Inoue Atsushi',role:'TL'},
  {name:'Mita Ryohei',role:'L4'},{name:'Hata Yasunori',role:'TL'},
  {name:'Shimamoto Mikako',role:'L4'},{name:'Murakami Takuya',role:'L4'},
  {name:'Yamazaki Mamoru',role:'L4'},{name:'Adachi Yuta',role:'L4'},
  {name:'Inoue Ryoga',role:'L4'},{name:'Kainuma Hidetaka',role:'L5'},
  {name:'Ozaki Kotaro',role:'L4'},{name:'Hayashi Mai',role:'L4'}
];

// ===== INIT =====
function initApp(){
  buildNavDots();
  setupScrollObserver();
  setupWheelControl();
  tryRestore();
  renderAttendance();
}

// ===== WHEEL CONTROL (1 page per scroll) =====
let currentPage=0;
let wheelLock=false;
function setupWheelControl(){
  const scroller=document.getElementById('scroller');
  scroller.addEventListener('wheel',function(e){
    // Check if the event target is inside a scrollable element
    let el=e.target;
    while(el&&el!==scroller){
      if(el.scrollHeight>el.clientHeight+2){
        const atTop=el.scrollTop<=0&&e.deltaY<0;
        const atBottom=el.scrollTop+el.clientHeight>=el.scrollHeight-2&&e.deltaY>0;
        if(!atTop&&!atBottom){return;} // let inner scroll happen
      }
      el=el.parentElement;
    }
    e.preventDefault();
    if(wheelLock)return;
    wheelLock=true;
    const pages=document.querySelectorAll('.card-page');
    if(e.deltaY>0&&currentPage<pages.length-1)currentPage++;
    else if(e.deltaY<0&&currentPage>0)currentPage--;
    pages[currentPage].scrollIntoView({behavior:'smooth'});
    setTimeout(()=>{wheelLock=false;},700);
  },{passive:false});
}

// ===== NAV DOTS =====
function buildNavDots(){
  const c=document.getElementById('navDots');
  const pages=document.querySelectorAll('.card-page');
  c.innerHTML='';
  for(let i=0;i<pages.length;i++){
    const d=document.createElement('button');
    d.className='nav-dot'+(i===0?' active':'');
    d.onclick=()=>goTo(i);
    c.appendChild(d);
  }
}

// ===== SCROLL OBSERVER =====
function setupScrollObserver(){
  const scroller=document.getElementById('scroller');
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      const card=e.target.querySelector('.card');
      if(e.isIntersecting){
        e.target.classList.add('snapped');
        if(card)card.classList.add('in-view');
        // Update dots
        const idx=parseInt(e.target.dataset.page);
        currentPage=idx;
        document.querySelectorAll('.nav-dot').forEach((d,i)=>{
          d.classList.toggle('active',i===idx);
        });
      } else {
        e.target.classList.remove('snapped');
        if(card)card.classList.remove('in-view');
      }
    });
  },{root:scroller,threshold:0.5});
  document.querySelectorAll('.card-page').forEach(p=>obs.observe(p));
}

function goTo(i){
  const page=document.querySelectorAll('.card-page')[i];
  if(page)page.scrollIntoView({behavior:'smooth'});
}

// ===== MEMBERS =====
function loadPaid(){
  members=PAID_MEMBERS.map(m=>({...m,soubet:true,ichi:true,ni:false}));
  renderMembers();renderAttendance();
  markDone(0);
}
function addMember(){
  const n=document.getElementById('newName').value.trim();
  const r=document.getElementById('newRole').value;
  if(!n)return;
  members.push({name:n,role:r,soubet:true,ichi:true,ni:false});
  document.getElementById('newName').value='';
  renderMembers();renderAttendance();
}
function removeMember(i){members.splice(i,1);renderMembers();renderAttendance();}
function renderMembers(){
  const c=document.getElementById('memberList');
  const b=document.getElementById('memberBadges');
  if(!members.length){c.innerHTML='';b.innerHTML='';return;}
  const counts={L4:0,L5:0,TL:0,L6:0};
  members.forEach(m=>counts[m.role]=(counts[m.role]||0)+1);
  b.innerHTML=Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>`<span class="card-badge">${k}: ${v}</span>`).join('');
  c.innerHTML='<div class="member-scroll" style="overflow-y:auto;margin-top:8px;font-size:0.75rem;flex:1;">'+
    members.map((m,i)=>`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border-light);"><span style="color:var(--text);">${m.name} <span style="color:var(--text-tertiary);">${m.role}</span></span><button style="background:none;border:none;color:var(--red);font-size:0.68rem;cursor:pointer;" onclick="removeMember(${i})">削除</button></div>`).join('')+'</div>';
  if(members.length)markDone(0);
}

// ===== GIFTS =====
function addGift(){
  const d=document.getElementById('giftDesc').value.trim();
  const a=parseInt(document.getElementById('giftAmt').value)||0;
  if(!d||!a)return;
  gifts.push({desc:d,amount:a});
  document.getElementById('giftDesc').value='';document.getElementById('giftAmt').value='';
  renderGifts();
}
function removeGift(i){gifts.splice(i,1);renderGifts();}
function renderGifts(){
  const c=document.getElementById('giftList');
  const t=document.getElementById('giftTotal');
  if(!gifts.length){c.innerHTML='';t.innerHTML='';return;}
  c.innerHTML=gifts.map((g,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border-light);font-size:0.78rem;"><span>${g.desc}</span><span style="display:flex;align-items:center;gap:8px;"><span style="color:#8ab4f8;font-weight:500;">¥${g.amount.toLocaleString()}</span><button style="background:none;border:none;color:var(--red);font-size:0.68rem;cursor:pointer;" onclick="removeGift(${i})">削除</button></span></div>`).join('');
  t.innerHTML=`合計: ¥${gifts.reduce((s,g)=>s+g.amount,0).toLocaleString()}`;
  markDone(1);
}

// ===== ATTENDANCE =====
function renderAttendance(){
  const tb=document.getElementById('attendBody');
  if(!members.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;color:var(--text-tertiary);padding:20px;font-size:0.78rem;">メンバーを読込してください</td></tr>';return;}
  tb.innerHTML=members.map((m,i)=>`<tr><td style="font-weight:500;">${m.name}</td><td style="color:var(--text-secondary);">${m.role}</td><td><input type="checkbox" ${m.soubet?'checked':''} onchange="members[${i}].soubet=this.checked"></td><td><input type="checkbox" ${m.ichi?'checked':''} onchange="members[${i}].ichi=this.checked"></td><td><input type="checkbox" ${m.ni?'checked':''} onchange="members[${i}].ni=this.checked"></td></tr>`).join('');
}
function bulkCheck(type,val){members.forEach(m=>m[type]=val);renderAttendance();}

// ===== AMOUNT =====
function calcFromPer(){
  const p=parseInt(document.getElementById('perPerson').value)||0;
  const h=parseInt(document.getElementById('headCount').value)||0;
  if(p&&h)document.getElementById('totalAmount').value=p*h;
}

// ===== CALCULATE =====
function calculate(){
  const total=parseInt(document.getElementById('totalAmount').value)||0;
  if(!total||!members.length){alert('金額とメンバーを設定してください');return;}
  const ratios={};
  document.querySelectorAll('.ratio-input').forEach(el=>{ratios[el.dataset.role]=parseFloat(el.value)||1;});
  const giftTotal=gifts.reduce((s,g)=>s+g.amount,0);
  const soubetMembers=members.filter(m=>m.soubet);
  const giftPer=soubetMembers.length?Math.round(giftTotal/soubetMembers.length):0;
  const partyAmount=total-giftTotal;
  const ichiMembers=members.filter(m=>m.ichi);
  const ichiWeight=ichiMembers.reduce((s,m)=>s+(ratios[m.role]||1),0);
  const ichiBase=ichiWeight?partyAmount/ichiWeight:0;

  results=members.map(m=>{
    let amt=0;
    if(m.soubet)amt+=giftPer;
    if(m.ichi)amt+=Math.round(ichiBase*(ratios[m.role]||1));
    return{name:m.name,role:m.role,amount:amt};
  });
  results.forEach(r=>{r.amount=Math.round(r.amount/100)*100;});
  renderResults(total);
  markDone(3);
  setTimeout(()=>goTo(4),300);
}
function renderResults(total){
  const tb=document.getElementById('resultsBody');
  tb.innerHTML=results.map(r=>`<tr><td>${r.name}</td><td>${r.role}</td><td>¥${r.amount.toLocaleString()}</td></tr>`).join('');
  const sum=results.reduce((s,r)=>s+r.amount,0);
  document.getElementById('resultsSummary').textContent=`${results.filter(r=>r.amount>0).length}名 / 合計 ¥${sum.toLocaleString()}`;
  const diff=sum-total;
  const dd=document.getElementById('resultsDiff');
  dd.innerHTML=diff===0?'<div class="results-diff ok">差分: ¥0（ピッタリ）</div>':`<div class="results-diff warn">差分: ¥${diff.toLocaleString()}（調整が必要）</div>`;
}

// ===== SLACK =====
function genSlack(){
  if(!results.length){alert('先に計算してください');return;}
  let msg='*支払いのお知らせ*\n\n';
  results.filter(r=>r.amount>0).forEach(r=>{msg+=`• ${r.name}（${r.role}）: ¥${r.amount.toLocaleString()}\n`;});
  msg+=`\n合計: ¥${results.reduce((s,r)=>s+r.amount,0).toLocaleString()}\n\n振込先: [入力]\n期限: [入力]`;
  document.getElementById('slackMsg').value=msg;
  markDone(5);
}
function copySlack(){
  const t=document.getElementById('slackMsg');t.select();
  try{document.execCommand('copy');}catch(e){}
}

// ===== DATA =====
function saveData(){
  try{localStorage.setItem('warikan_data',JSON.stringify({members,gifts,total:document.getElementById('totalAmount').value}));}catch(e){}
  alert('保存しました');
}
function restoreData(){
  try{const d=JSON.parse(localStorage.getItem('warikan_data'));if(!d)return alert('データなし');members=d.members||[];gifts=d.gifts||[];document.getElementById('totalAmount').value=d.total||'';renderMembers();renderGifts();renderAttendance();}catch(e){alert('復元失敗');}
}
function tryRestore(){
  try{const d=JSON.parse(localStorage.getItem('warikan_data'));if(d&&d.members&&d.members.length){members=d.members;gifts=d.gifts||[];document.getElementById('totalAmount').value=d.total||'';renderMembers();renderGifts();renderAttendance();}}catch(e){}
}
function clearAll(){
  if(!confirm('全データをクリアしますか？'))return;
  members=[];gifts=[];results=[];
  try{localStorage.removeItem('warikan_data');}catch(e){}
  renderMembers();renderGifts();renderAttendance();
  document.getElementById('totalAmount').value='';
  document.getElementById('resultsBody').innerHTML='';
  document.getElementById('resultsDiff').innerHTML='';
  document.getElementById('resultsSummary').textContent='';
  document.querySelectorAll('.agenda-item').forEach(el=>el.classList.remove('done'));
}

// ===== BULK MODAL =====
function openBulkModal(){document.getElementById('bulkModal').classList.add('show');}
function closeBulkModal(){document.getElementById('bulkModal').classList.remove('show');}
function applyBulk(){
  const text=document.getElementById('bulkText').value.trim();
  if(!text){closeBulkModal();return;}
  text.split('\n').forEach(line=>{
    const parts=line.split(/[,\t]/);
    if(parts.length>=2){const name=parts[0].trim();const role=parts[1].trim().toUpperCase();if(name&&['L4','L5','TL','L6'].includes(role)){members.push({name,role,soubet:true,ichi:true,ni:false});}}
  });
  document.getElementById('bulkText').value='';
  closeBulkModal();renderMembers();renderAttendance();
}

// ===== HELPERS =====
function markDone(i){
  const item=document.querySelectorAll('.agenda-item')[i];
  if(item)item.classList.add('done');
}
</script>
